name: Build HexRDP APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  # Correct way: use -D prefix inside jvmargs — NOT bare -Xmx at GRADLE_OPTS level
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -Dorg.gradle.daemon=false"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Bootstrap Gradle Wrapper
        # Regenerate gradle-wrapper.jar using the system Gradle
        # This replaces the placeholder jar with the real one
        run: |
          gradle wrapper \
            --gradle-version 8.10.2 \
            --distribution-type bin \
            --no-daemon \
          || echo "Using existing wrapper jar"

      # setup-gradle v4 does wrapper-validation automatically
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          gradle-home-cache-cleanup: true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HexRDP-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Build Release APK (unsigned)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Bootstrap Gradle Wrapper
        run: |
          gradle wrapper \
            --gradle-version 8.10.2 \
            --distribution-type bin \
            --no-daemon \
          || echo "Using existing wrapper jar"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          gradle-home-cache-cleanup: true

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HexRDP-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: HexRDP ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## HexRDP ${{ github.ref_name }}

            > **APK is unsigned** — sign externally before distributing:
            > ```bash
            > # Using Android SDK apksigner:
            > apksigner sign \
            >   --ks your-keystore.jks \
            >   --ks-alias your-alias \
            >   --ks-pass pass:KEYSTORE_PASS \
            >   --key-pass pass:KEY_PASS \
            >   --out HexRDP-signed.apk \
            >   HexRDP-release-unsigned.apk
            >
            > # Verify signature:
            > apksigner verify --verbose HexRDP-signed.apk
            > ```

            ### Features
            - Pure Kotlin RDP (no NDK) — builds anywhere
            - Multi-session management with screenshots
            - Adaptive quality for 2G/3G/WiFi/LAN
            - Touchpad mode + F1-F12 extra keys
            - Arabic RTL + English
            - Space-themed UI, Dark/Light mode

            **Developer:** [@GoToHEX](https://t.me/GoToHEX)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    # Run lint independently, don't block on it
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Bootstrap Gradle Wrapper
        run: |
          gradle wrapper \
            --gradle-version 8.10.2 \
            --distribution-type bin \
            --no-daemon \
          || echo "Using existing wrapper jar"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          gradle-home-cache-cleanup: true

      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace --no-daemon
        # Continue even if lint reports warnings
        continue-on-error: true

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.run_number }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          retention-days: 7
          if-no-files-found: warn
